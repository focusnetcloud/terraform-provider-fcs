# CI for pull requests and main: build, format/vet checks, unit + acceptance
# tests against the in-process httptest mock (no real FCS API), and a docs
# drift check so docs/ never goes stale against the schema.
name: Tests

on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  build:
    name: build / vet / fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - name: Verify module files are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - run: go build -v ./...
      - run: go vet ./...
      - run: make vuln
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt needed on:"; echo "$out"; exit 1
          fi

  test:
    name: unit + acceptance (terraform ${{ matrix.terraform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - '1.10.*'
          - '1.11.*'
          - '1.12.*'
          - '1.13.*'
          - '1.14.*'
          - '1.15.*'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      - name: Unit tests
        run: go test ./... -timeout 120s
      - name: Acceptance tests (mock-backed)
        env:
          TF_ACC: '1'
        run: go test ./internal/provider/ -v -timeout 10m

  docs:
    name: docs drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Regenerate docs
        run: make docs
      - name: Fail if docs are out of date
        run: |
          if [ -n "$(git status --porcelain docs)" ]; then
            echo "::error::docs/ is out of date — run 'make docs' and commit the result."
            git --no-pager diff docs
            exit 1
          fi
