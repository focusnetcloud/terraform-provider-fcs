# Builds and publishes a Terraform Registry release on every v* tag.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   GPG_PRIVATE_KEY  ASCII-armored private key whose public half is registered
#                    with the Terraform Registry signing keys for focusnetcloud.
#   PASSPHRASE       Passphrase for GPG_PRIVATE_KEY.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser needs the full history + tags to derive the version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify module files are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test ./... -timeout 10m

      - name: Scan reachable Go vulnerabilities
        run: make vuln

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
